x-backend-env: &backend-env
  PORT: ${PORT:-5000}
  SUPABASE_DB_HOST: ${SUPABASE_DB_HOST}
  SUPABASE_DB_NAME: ${SUPABASE_DB_NAME}
  SUPABASE_DB_USER: ${SUPABASE_DB_USER}
  SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
  SUPABASE_DB_PORT: ${SUPABASE_DB_PORT:-6543}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
  GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
  SYSTEM_UID: ${SYSTEM_UID}
  FRONTEND_URL: ${FRONTEND_URL}
  RESEND_API: ${RESEND_API:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
  RESEND_FROM_NAME: ${RESEND_FROM_NAME:-MediTime}
  NOTIFICATION_EMAIL_ADDRESS: ${NOTIFICATION_EMAIL_ADDRESS:-}
  TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID}
  TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET}
  TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID}
  RAILWAY_ENVIRONMENT: ${RAILWAY_ENVIRONMENT:-false}

services:
  backend-api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-ghcr.io/mtx26/meditime-backend:latest}
    working_dir: /app
    environment: *backend-env
    ports:
      - "${HOST_PORT:-5000}:5000"
    command: >
      gunicorn -w 9 --threads 2 -b 0.0.0.0:5000 --timeout 120
      --access-logfile - --error-logfile - app.main:app
    deploy:
      restart_policy:
        condition: any


  backend-scheduler:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-ghcr.io/mtx26/meditime-backend:latest}
    working_dir: /app
    environment: *backend-env
    command: python scheduler.py
    deploy:
      restart_policy:
        condition: any
