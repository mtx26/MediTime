    post:
      tags: [Documents]
      summary: Sauvegarder le résultat d'analyse
      operationId: saveAnalysisResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [boxes]
              properties:
                calendarName:
                  type: string
                  default: "Calendrier (analyse)"
                boxes:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Résultat sauvegardé
