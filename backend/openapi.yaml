  /documents/analyze:
    post:
      tags: [Documents]
      summary: Analyser un document médical (IA)
      operationId: analyzeDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: byte
                  description: Image encodée en base64
      responses:
        '200':
          description: Document analysé
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          medicines:
                            type: array
                            items:
                              type: object
        '400':
          description: Image manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

