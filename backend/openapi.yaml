  # ═══════════════════════════════════════════════════════════════════════════
  /log:
    post:
      tags: [Logs]
      summary: Envoyer des logs frontend
      operationId: logFrontend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                type:
                  type: string
                  enum: [info, warning, error, debug]
                  default: info
                context:
                  type: object
                error:
                  type: string
                stack:
                  type: string
