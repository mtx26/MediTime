  # ═══════════════════════════════════════════════════════════════════════════
  # ICS (Calendriers personnels)
  # ═══════════════════════════════════════════════════════════════════════════
  /calendars/{calendar_id}/ics:
    post:
      tags: [ICS]
      summary: Créer un token ICS
      operationId: createICSToken
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Token ICS créé
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ICSToken'
              example:
                message: "Token ICS créé"
                code: "ICS_CREATED"
                data:
                  id: 41
                  token: "ics123"
                  calendar_id: 1
                  user_id: "6b5f9d84-1d3b-4c3e-b6c3-1b2d4f6a9c01"
                  ics_url: "https://api.meditime-app.com/api/calendar/ics123.ics"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

    get:
      tags: [ICS]
      summary: Lister tokens ICS
      operationId: listICSTokens
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tokens listés
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tokens:
                            type: array
                            items:
                              $ref: '#/components/schemas/ICSToken'
              example:
                message: "Tokens ICS"
                code: "ICS_LIST"
                data:
                  tokens:
                    - id: 41
                      token: "ics123"
                      calendar_id: 1
                      user_id: "6b5f9d84-1d3b-4c3e-b6c3-1b2d4f6a9c01"
                      ics_url: "https://api.meditime-app.com/api/calendar/ics123.ics"
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /calendars/{calendar_id}/ics/{token_id}:
    delete:
      tags: [ICS]
      summary: Supprimer un token ICS
      operationId: deleteICSToken
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
        - name: token_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Token supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
              example:
                message: "Token supprimé"
                code: "ICS_DELETED"
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /calendar/{token}.ics:
    get:
      tags: [ICS]
      summary: Télécharger le fichier ICS
      operationId: downloadICSFile
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fichier ICS
          content:
            text/calendar:
              schema:
                type: string
              example: "BEGIN:VCALENDAR...END:VCALENDAR"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # DOCUMENTS (Analyse IA)
  # ═══════════════════════════════════════════════════════════════════════════
  /documents/analyze:
    post:
      tags: [Documents]
      summary: Analyser un document médical (IA)
      operationId: analyzeDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: byte
                  description: Image encodée en base64
      responses:
        '200':
          description: Document analysé
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          medicines:
                            type: array
                            items:
                              type: object
              example:
                message: "Analyse terminée"
                code: "DOCUMENT_ANALYZED"
                data:
                  medicines:
                    - name: "Amoxicilline"
                      dose: "500mg"
                      frequency: "2/j"
                      duration_days: 7
        '400':
          description: Image manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/analyze/save:
    post:
      tags: [Documents]
      summary: Sauvegarder le résultat d'analyse
      operationId: saveAnalysisResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [boxes]
              properties:
                calendarName:
                  type: string
                  default: "Calendrier (analyse)"
                boxes:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Résultat sauvegardé
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          calendar_id:
                            type: integer
              example:
                message: "Analyse sauvegardée"
                code: "DOCUMENT_SAVED"
                data:
                  calendar_id: 42
        '400':
          description: Données manquantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # PDF (Notices)
  # ═══════════════════════════════════════════════════════════════════════════
  /proxy/pdf/{box_id}:
    get:
      tags: [PDF]
      summary: Télécharger la notice PDF
      operationId: proxyPDF
      security: []
      parameters:
        - name: box_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PDF téléchargé
          content:
            application/pdf:
              schema:
                type: string
                format: binary
              example: "PDF binary"
        '400':
          description: Box ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════════
  # LOGS
  # ═══════════════════════════════════════════════════════════════════════════
  /log:
    post:
      tags: [Logs]
      summary: Envoyer des logs frontend
      operationId: logFrontend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                type:
                  type: string
                  enum: [info, warning, error, debug]
                  default: info
                context:
                  type: object
                error:
                  type: string
                stack:
                  type: string
      responses:
        '200':
          description: Log enregistré
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
              example:
                status: "ok"
