openapi: 3.0.3
info:
  title: MediTime API
  description: |
    API REST complète pour **MediTime**, application de gestion de médicaments et suivi des traitements médicaux.

    ## 🔐 Authentification
    L'API utilise **Supabase Auth** avec tokens JWT Bearer.  
    La plupart des endpoints nécessitent le header `Authorization: Bearer <token>`.

    ### Obtenir un token
    1. Authentifiez-vous via Supabase Auth (email/password, Google, etc.)
    2. Récupérez le token JWT depuis la session Supabase
    3. Ajoutez-le au header : `Authorization: Bearer <votre_token>`

    ## 🏗 Architecture
    | Composant | Technologie |
    |-----------|-------------|
    | Frontend | React 19 (Vite) + Bootstrap 5 + Supabase Client |
    | Backend | Flask (Python) + PostgreSQL + Raw SQL (psycopg2) |
    | Base de données | PostgreSQL avec Row Level Security (RLS) |
    | Infrastructure | Docker + CapRover + Render |

    ## 🚀 Guide de démarrage
    1. `GET /api/status` — Vérifier la connexion
    2. `GET /api/user/sync` — Synchroniser votre profil
    3. `GET /api/calendars` — Lister vos calendriers
    4. `POST /api/calendars` — Créer un calendrier

    ## 📦 Codes de réponse
    | Code | Signification |
    |------|---------------|
    | 200 | Succès |
    | 400 | Requête invalide (données manquantes) |
    | 401 | Non authentifié |
    | 403 | Accès refusé |
    | 404 | Ressource non trouvée |
    | 500 | Erreur serveur |

  version: 2.0.0
  contact:
    name: MediTime Support
    url: https://meditime-app.com
    email: support@meditime-app.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-logo:
    url: https://meditime-app.com/icons/icon-512x512.png
    altText: MediTime Logo

servers:
  - url: http://localhost:5000/api
    description: 🖥️ Serveur local (développement)
  - url: https://dev.api.meditime-app.com/api
    description: 🧪 Serveur de développement
  - url: https://api.meditime-app.com/api
    description: 🚀 Serveur de production

tags:
  - name: Status
    description: Health checks et vérification du statut de l'API
  - name: User
    description: Gestion du profil utilisateur, synchronisation et préférences
  - name: Calendars
    description: Gestion des calendriers personnels de médicaments
  - name: Boxes
    description: Gestion des boîtes de médicaments (stock, alertes, conditions)
  - name: Pillbox
    description: Suivi des prises de médicaments (pilulier)
  - name: Shared Calendars
    description: Calendriers partagés entre utilisateurs
  - name: Invitations
    description: Invitations et partages de calendriers
  - name: Tokens
    description: Tokens de partage public (accès sans authentification)
  - name: Notifications
    description: Alertes de stock, invitations, rappels
  - name: ICS
    description: Export calendrier ICS (Google Calendar, Outlook)
  - name: Documents
    description: Analyse IA de documents médicaux (Vertex AI / Gemini)
  - name: PDF
    description: Proxy pour notices PDF des médicaments
  - name: Logs
    description: Collecte des logs frontend

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT Supabase Auth.
        
        **Format du header :**
        ```
        Authorization: Bearer eyJhbGciOiJIUzI1NiIs...
        ```

  responses:
    Forbidden:
      description: Accès non autorisé
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Accès interdit"
            code: "FORBIDDEN"
            i18n_key: "api.common.forbidden"
            status_code: 403

    ServerError:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Erreur interne"
            code: "INTERNAL_ERROR"
            i18n_key: "api.common.internal_error"
            status_code: 500

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Ressource introuvable"
            code: "NOT_FOUND"
            i18n_key: "api.common.not_found"
            status_code: 404

  schemas:
    Error:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
          description: Message d'erreur lisible
          example: "Erreur lors de la récupération des données"
        code:
          type: string
          description: Code d'erreur machine
          example: "CALENDAR_FETCH_ERROR"
        i18n_key:
          type: string
          description: Clé de traduction i18n
          example: "api.calendar.fetch_error"
        error:
          type: string
          description: Détails techniques (dev uniquement)
        status_code:
          type: integer
          example: 500
      example:
        message: "Erreur lors de la récupération des données"
        code: "CALENDAR_FETCH_ERROR"
        i18n_key: "api.calendar.fetch_error"
        error: "string"
        status_code: 500

    Success:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
          example: "Opération réussie"
        code:
          type: string
          example: "OPERATION_SUCCESS"
        i18n_key:
          type: string
        data:
          type: object
          additionalProperties: true

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UID Supabase
        display_name:
          type: string
          example: "Jean Dupont"
        email:
          type: string
          format: email
          example: "jean@example.com"
        photo_url:
          type: string
          format: uri
        email_enabled:
          type: boolean
          description: Notifications email activées
        push_enabled:
          type: boolean
          description: Notifications push activées
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Calendar:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Mon traitement"
        owner_uid:
          type: string
          format: uuid
        boxes_count:
          type: integer
          description: Nombre de boîtes
        ifLowStock:
          type: boolean
          description: Au moins une boîte en stock faible
        stock_decrement_method:
          type: string
          enum: [weekly_pillbox, daily_midnight]
          description: Mode de décrémentation du stock (pilulier hebdomadaire ou décrément quotidien)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    MedicineBox:
      type: object
      properties:
        id:
          type: integer
        calendar_id:
          type: integer
        name:
          type: string
          example: "Doliprane 1000mg"
        dose:
          type: string
          example: "1 comprimé"
        box_capacity:
          type: integer
          example: 30
        stock_quantity:
          type: integer
          example: 15
        stock_alert_threshold:
          type: integer
          example: 5
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/MedicineCondition'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    MedicineCondition:
      type: object
      properties:
        id:
          type: integer
        box_id:
          type: integer
        tablet_count:
          type: number
          example: 1
        interval_days:
          type: integer
          example: 1
        start_date:
          type: string
          format: date
          nullable: true
        time_of_day:
          type: string
          enum: [morning, noon, evening]
          example: "morning"
        max_date:
          type: string
          format: date-time
          nullable: true

    PillboxUse:
      type: object
      properties:
        id:
          type: integer
        calendar_id:
          type: integer
        user_id:
          type: string
          format: uuid
        used_at:
          type: string
          format: date-time
        period_start:
          type: string
          format: date

    Notification:
      type: object
      properties:
        notification_id:
          type: integer
        notification_type:
          type: string
          enum:
            - low_stock
            - calendar_invitation
            - calendar_invitation_accepted
            - calendar_invitation_rejected
            - calendar_shared_deleted_by_receiver
            - calendar_shared_deleted_by_owner
        read:
          type: boolean
        timestamp:
          type: string
          format: date-time
        calendar_id:
          type: integer
          nullable: true
        calendar_name:
          type: string
          nullable: true
        sender_name:
          type: string
          nullable: true
        sender_email:
          type: string
          nullable: true
        sender_photo_url:
          type: string
          nullable: true
        medication_name:
          type: string
          nullable: true
        medication_qty:
          type: integer
          nullable: true
        accepted:
          type: boolean
          nullable: true
        token:
          type: string
          nullable: true
        link:
          type: string
          nullable: true

    SharedCalendar:
      type: object
      properties:
        id:
          type: integer
        access:
          type: string
          enum: [view, edit]
        name:
          type: string
        owner_uid:
          type: string
          format: uuid
        owner_name:
          type: string
        owner_email:
          type: string
        owner_photo_url:
          type: string
        notifications_enabled:
          type: boolean
        boxes_count:
          type: integer
        ifLowStock:
          type: boolean

    Token:
      type: object
      properties:
        id:
          type: integer
        token:
          type: string
        calendar_id:
          type: integer
        owner_uid:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    ICSToken:
      type: object
      properties:
        id:
          type: integer
        token:
          type: string
        calendar_id:
          type: integer
        user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        ics_url:
          type: string
          format: uri
          example: "https://api.meditime-app.com/api/calendar/abc123.ics"

    Invitation:
      type: object
      properties:
        token:
          type: string
        calendar_id:
          type: integer
        calendar_name:
          type: string
        owner_email:
          type: string
        owner_display_name:
          type: string
        owner_photo_url:
          type: string
        invited_email:
          type: string
        accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Schedule:
      type: object
      properties:
        schedule:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
        table:
          type: object
        calendar_name:
          type: string
        if_low_stock:
          type: boolean

paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # STATUS
  # ═══════════════════════════════════════════════════════════════════════════
  /status:
    get:
      tags: [Status]
      summary: Vérifier le statut de l'API
      operationId: getStatus
      security: []
      responses:
        '200':
          description: API opérationnelle
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
              example:
                status: ok
    head:
      tags: [Status]
      summary: Health check (HEAD)
      operationId: headStatus
      security: []
      responses:
        '200':
          description: API opérationnelle

  # ═══════════════════════════════════════════════════════════════════════════
  # USER
  # ═══════════════════════════════════════════════════════════════════════════
  /user/sync:
    get:
      tags: [User]
      summary: Récupérer le profil utilisateur
      operationId: getUserInfo
      responses:
        '200':
          description: Profil récupéré
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                message: "Profil synchronisé"
                code: "USER_SYNC_SUCCESS"
                data:
                  id: "6b5f9d84-1d3b-4c3e-b6c3-1b2d4f6a9c01"
                  display_name: "Jean Dupont"
                  email: "jean@example.com"
                  photo_url: "https://cdn.meditime-app.com/avatars/jean.png"
                  email_enabled: true
                  push_enabled: true
                  created_at: "2024-10-01T12:00:00Z"
                  updated_at: "2025-01-01T09:30:00Z"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /user/update:
    put:
      tags: [User]
      summary: Mettre à jour le profil
      operationId: updateUserInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
                  format: email
                photo_url:
                  type: string
                  format: uri
                email_enabled:
                  type: boolean
                push_enabled:
                  type: boolean
      responses:
        '200':
          description: Profil mis à jour
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                message: "Profil mis à jour"
                code: "USER_UPDATED"
                data:
                  id: "6b5f9d84-1d3b-4c3e-b6c3-1b2d4f6a9c01"
                  display_name: "Jean D."
                  email: "jean@example.com"
                  photo_url: "https://cdn.meditime-app.com/avatars/jean.png"
                  email_enabled: true
                  push_enabled: false
        '400':
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

  /user/photo:
    post:
      tags: [User]
      summary: Uploader une photo de profil
      operationId: uploadUserPhoto
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Photo uploadée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          photo_url:
                            type: string
                            format: uri
              example:
                message: "Photo mise à jour"
                code: "USER_PHOTO_UPDATED"
                data:
                  photo_url: "https://cdn.meditime-app.com/avatars/jean.png"
        '400':
          description: Fichier manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

  # ═══════════════════════════════════════════════════════════════════════════
  # CALENDARS
  # ═══════════════════════════════════════════════════════════════════════════
  /calendars:
    get:
      tags: [Calendars]
      summary: Lister mes calendriers
      operationId: getCalendars
      responses:
        '200':
          description: Calendriers récupérés
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          calendars:
                            type: array
                            items:
                              $ref: '#/components/schemas/Calendar'
              example:
                message: "Calendriers récupérés"
                code: "CALENDARS_LIST_SUCCESS"
                data:
                  calendars:
                    - id: 1
                      name: "Traitement matin"
                      owner_uid: "6b5f9d84-1d3b-4c3e-b6c3-1b2d4f6a9c01"
                      boxes_count: 2
                      ifLowStock: false
                      stock_decrement_method: "weekly_pillbox"
                    - id: 2
                      name: "Post-op"
                      owner_uid: "6b5f9d84-1d3b-4c3e-b6c3-1b2d4f6a9c01"
                      boxes_count: 1
                      ifLowStock: true
                      stock_decrement_method: "daily_midnight"
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Calendars]
      summary: Créer un calendrier
      operationId: createCalendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [calendarName]
              properties:
                calendarName:
                  type: string
                  example: "Mon traitement"
      responses:
        '200':
          description: Calendrier créé
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          calendarId:
                            type: integer
                          calendarName:
                            type: string
              example:
                message: "Calendrier créé"
                code: "CALENDAR_CREATED"
                data:
                  calendarId: 3
                  calendarName: "Nouveau calendrier"
        '400':
          description: Nom manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendars/{calendar_id}:
    put:
      tags: [Calendars]
      summary: Renommer un calendrier
      operationId: renameCalendar
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newCalendarName]
              properties:
                newCalendarName:
                  type: string
      responses:
        '200':
          description: Calendrier renommé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
              example:
                message: "Calendrier renommé"
                code: "CALENDAR_RENAMED"
        '400':
          description: Nom invalide ou identique
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Calendars]
      summary: Supprimer un calendrier
      operationId: deleteCalendar
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Calendrier supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
              example:
                message: "Calendrier supprimé"
                code: "CALENDAR_DELETED"
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /calendars/{calendar_id}/schedule:
    get:
      tags: [Calendars]
      summary: Générer le planning d'un calendrier
      operationId: getCalendarSchedule
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          description: Date de début (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Planning généré
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Schedule'
              example:
                message: "Planning généré"
                code: "SCHEDULE_OK"
                data:
                  calendar_name: "Traitement matin"
                  if_low_stock: false
                  schedule:
                    "2025-01-05":
                      - time: "08:00"
                        box_id: 12
                        medicine: "Doliprane"
                        quantity: 1
                  table:
                    headers: ["Heure", "Médicament", "Quantité"]
                    rows:
                      - ["08:00", "Doliprane", "1 comprimé"]
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /calendars/{calendar_id}/pdf:
    get:
      tags: [Calendars]
      summary: Télécharger le calendrier en PDF
      operationId: downloadCalendarPDF
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PDF généré
          content:
            application/pdf:
              schema:
                type: string
                format: binary
              example: "PDF binary"
        '400':
          description: ID manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendars/{calendar_id}/stock-decrement-method:
    get:
      tags: [Calendars]
      summary: Récupérer la méthode de décompte du stock
      operationId: getStockDecrementMethod
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Méthode récupérée
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          method:
                            type: string
                            enum: [weekly_pillbox, daily_midnight]
              example:
                message: "Méthode récupérée"
                code: "STOCK_METHOD_OK"
                data:
                  method: "weekly_pillbox"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Calendars]
      summary: Modifier la méthode de décompte du stock
      operationId: updateStockDecrementMethod
      parameters:
        - name: calendar_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [weekly_pillbox, daily_midnight]
      responses:
        '200':
          description: Méthode mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
              example:
                message: "Méthode mise à jour"
                code: "STOCK_METHOD_UPDATED"
        '400':
          description: Méthode manquante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur serveur
          content:
            application/json:
