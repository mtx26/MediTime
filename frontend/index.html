<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <!-- Title, description et meta tags SEO gérés dynamiquement par useI18nMetadata -->
    
    <!-- ✅ META de base -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5FC3B4" />
    <meta name="author" content="MediTime" />
    <meta name="creator" content="Mtx_26" />
    <meta name="publisher" content="MediTime" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    
    <!-- ✅ DNS Prefetch et Preconnect pour performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://firebase.googleapis.com" />
    <link rel="dns-prefetch" href="https://supabase.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firebase.googleapis.com" />
    <link rel="preconnect" href="https://supabase.co" crossorigin />

    <!-- Open Graph, Twitter, Pinterest gérés dynamiquement par useI18nMetadata -->

    <!-- ✅ PWA & Mobile App -->
    <meta name="application-name" content="MediTime" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MediTime" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#5FC3B4" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="msapplication-starturl" content="/" />
    
    <!-- ✅ Geo Tags (si applicable) -->
    <meta name="geo.region" content="BE" />
    <meta name="geo.placename" content="Belgium" />

    <!-- ✅ Favicon et icônes (le manifest sera géré dynamiquement) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="mask-icon" href="/icons/icon-512.png" color="#5FC3B4" />

    <!-- ✅ Informations additionnelles -->
    <link rel="author" href="/humans.txt" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="alternate" type="application/rss+xml" title="MediTime RSS" href="/feed.xml" />

    <!-- DNS Prefetch supprimés (déjà en haut) -->
    <!-- ✅ Optimisation Google Fonts & Firebase -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    </noscript>
    
    <!-- ✅ Styles critiques (navbar + hero) -->
    <style>
      /* Hero */
      .hero {
        background-color: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        padding-top: 3rem;
        padding-bottom: 3rem;
        border-radius: 0.3rem;
      }
      .hero img {
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      .lead.text-muted {
        font-size: 1.25rem;
        font-weight: 300;
        color: #6c757d;
      }
      /* Navbar */
      .navbar {
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        background-color: #fff;
        border-bottom: 1px solid #dee2e6;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      }
      .navbar-brand {
        font-weight: 700;
        text-decoration: none;
      }
    </style>

    <!-- Preload LCP image -->
    <link
      rel="preload"
      as="image"
      href="/icons/logo.png"
      fetchpriority="high"
    />

    <!-- Schema.org JSON-LD sera généré dynamiquement par useI18nMetadata -->
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>MediTime - Medication Management</h1>
        <p>JavaScript is required to use this application.</p>
        <p>Please enable JavaScript in your browser settings to continue.</p>
        <p><a href="https://meditime-app.com/en/home">Refresh page</a></p>
      </div>
    </noscript>
    <div id="root"></div>
    <div id="modal-container"></div>

    <!-- ✅ Entrée React -->
    <script type="module" src="./src/index.jsx"></script>
  </body>
</html>
