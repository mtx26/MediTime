<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MediTime</title>

    <!-- ✅ META essentiels -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5FC3B4" />
    
    <!--Android-->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ✅ Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- ✅ Favicon (le manifest sera géré dynamiquement) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- ✅ Optimisation Google Fonts & Firebase -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firebase.googleapis.com" />
    <!-- Remplace cette ligne si tu utilises une autre police -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Bootstrap Icons (non-bloquant) -->
    <link 
      rel="preload" 
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      as="style"
      crossorigin="anonymous"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    </noscript>

    <!-- ✅ Bootstrap -->
    <link 
      rel="preload" 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    </noscript>
    
    <!-- ✅ Styles critiques (navbar + hero) -->
    <style>
      /* Hero */
      .hero {
        background-color: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        padding-top: 3rem;
        padding-bottom: 3rem;
        border-radius: 0.3rem;
      }
      .hero img {
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      .lead.text-muted {
        font-size: 1.25rem;
        font-weight: 300;
        color: #6c757d;
      }
      /* Navbar */
      .navbar {
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        background-color: #fff;
        border-bottom: 1px solid #dee2e6;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      }
      .navbar-brand {
        font-weight: 700;
        text-decoration: none;
      }
    </style>

    <!-- Preload LCP image -->
    <link
      rel="preload"
      as="image"
      href="/icons/logo.png"
      fetchpriority="high"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MediTime",
        "url": "https://meditime-app.com",
        "logo": "https://meditime-app.com/icons/icon-192.png",
        "founder": {
          "@type": "Person",
          "name": "Mtx_26"
        },
        "sameAs": [
          "https://github.com/mtx26"
        ],
        "contactPoint": [{
          "@type": "ContactPoint",
          "email": "mailto:mtx_26@outlook.be",
          "contactType": "technical support"
        }]
      }
      </script>
      <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
      <script>eruda.init();</script> -->
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-container"></div>

    <!-- ✅ Entrée React -->
    <script type="module" src="./src/index.jsx"></script>
  </body>
</html>
