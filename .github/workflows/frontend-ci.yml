name: Frontend CI

on:
  push:
    paths:
      - 'apps/web/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Lint the code
        run: npm run lint --workspace=apps/web || echo "No linter configured"

      - name: Build the app
        run: npm run build --workspace=apps/web
