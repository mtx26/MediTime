name: Dump public schema

on:
  schedule:
    - cron: "0 2 * * *"   # Tous les jours à 02h
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ Donne le droit de push

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump public schema
        run: |
          mkdir -p dumps
          pg_dump "$SUPABASE_DB_URL" \
            --schema=public \
            --schema-only \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --file=dumps/public_schema.sql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Clean dump for Supabase
        run: |
          # Supprimer les lignes \restrict et \unrestrict
          sed -i '/\\restrict/d' dumps/public_schema.sql
          sed -i '/\\unrestrict/d' dumps/public_schema.sql
          
          # Supprimer le CREATE SCHEMA public et son COMMENT
          sed -i '/^CREATE SCHEMA public;$/d' dumps/public_schema.sql
          sed -i '/^COMMENT ON SCHEMA public/,/^$/d' dumps/public_schema.sql

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dumps/public_schema.sql
          git commit -m "Update public schema" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
